version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: burnout-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3080:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: burnout-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3081:3000"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/burnout.db
      - PORT=3000
      - NODE_ENV=production
      - ADMIN_TOKEN=${ADMIN_TOKEN:-changeme}
